<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>North Castle - Level 1 Results Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #2a0845;
            --bg-gradient: linear-gradient(135deg, #6441A5, #2a0845);
            --primary: #9C27B0;
            --accent: #ffeb3b;
            --success: #4CAF50;
            --danger: #ff1744;
            --neutral: #4fc3f7;
            --text-main: #fff;
            --text-muted: #e0e0e0;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }

        /* Filter Controls */
        .filters {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .form-control {
            flex: 1;
            min-width: 200px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--glass-border);
            color: var(--text-main);
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-control option {
            background: #2a0845;
            color: white;
        }

        .primary-btn {
            background: linear-gradient(135deg, #ffeb3b, #fbc02d);
            color: #333;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 235, 59, 0.3);
        }

        .danger-btn {
            background: rgba(255, 23, 68, 0.2);
            color: var(--danger);
            border: 2px solid var(--danger);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .danger-btn:hover {
            background: var(--danger);
            color: white;
        }

        /* Table Styles */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        th,
        td {
            text-align: left;
            padding: 15px;
        }

        th {
            color: var(--accent);
            font-weight: 800;
            font-size: 1.2rem;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        tbody tr {
            background: rgba(0, 0, 0, 0.2);
            transition: transform 0.2s;
        }

        tbody tr:hover {
            transform: scale(1.01);
            background: rgba(255, 255, 255, 0.05);
        }

        tbody tr td:first-child {
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
        }

        tbody tr td:last-child {
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        .score-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .score-good {
            background: rgba(76, 175, 80, 0.2);
            color: var(--success);
        }

        .score-medium {
            background: rgba(255, 235, 59, 0.2);
            color: var(--accent);
        }

        .score-poor {
            background: rgba(255, 23, 68, 0.2);
            color: var(--danger);
        }

        .details-btn {
            background: var(--neutral);
            border: none;
            color: #000;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        .details-btn:hover {
            background: #fff;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: #1a052e;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            border-radius: 20px;
            border: 1px solid var(--accent);
            padding: 30px;
            overflow-y: auto;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 2rem;
            cursor: pointer;
        }

        .close-btn:hover {
            color: white;
        }

        .mistake-card {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--danger);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 0 10px 10px 0;
        }

        .mistake-q {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .mistake-wrong {
            color: var(--danger);
            margin-bottom: 5px;
        }

        .mistake-correct {
            color: var(--success);
            font-weight: bold;
        }

        .mistake-cat {
            font-size: 0.9rem;
            color: var(--accent);
            margin-bottom: 5px;
            text-transform: uppercase;
        }
    
        /* Mobile Responsive Table */
        @media (max-width: 768px) {
            table, thead, tbody, th, td, tr {
                display: block;
            }
            thead tr {
                position: absolute;
                top: -9999px;
                left: -9999px;
            }
            tbody tr {
                border: 2px solid var(--glass-border);
                margin-bottom: 20px;
                border-radius: 15px;
                background: rgba(0, 0, 0, 0.4);
                overflow: hidden;
            }
            tbody tr:hover {
                transform: none;
            }
            td {
                border: none;
                border-bottom: 1px solid rgba(255,255,255,0.05);
                position: relative;
                padding-left: 45%;
                text-align: right;
                min-height: 40px;
                display: flex;
                align-items: center;
                justify-content: flex-end;
            }
            td:before {
                position: absolute;
                top: 50%;
                left: 15px;
                transform: translateY(-50%);
                width: 40%;
                padding-right: 10px;
                white-space: nowrap;
                text-align: left;
                font-weight: bold;
                color: var(--accent);
                text-transform: uppercase;
                font-size: 0.85rem;
                letter-spacing: 1px;
            }
            td:nth-of-type(1):before { content: "Date & Time"; }
            td:nth-of-type(2):before { content: "Student"; }
            td:nth-of-type(3):before { content: "Trainer"; }
            td:nth-of-type(4):before { content: "Branch"; }
            td:nth-of-type(5):before { content: "Code"; }
            td:nth-of-type(6):before { content: "Score"; }
            td:nth-of-type(7):before { content: "Action"; }
            
            tbody tr td:first-child {
                border-top-left-radius: 0;
            }
            tbody tr td:last-child {
                border-bottom-right-radius: 0;
                border-bottom: none;
            }
            .filters {
                flex-direction: column;
            }
            .form-control {
                width: 100%;
            }
        }

    </style>

        <!-- Supabase Initialization -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        window.supabaseUrl = 'https://wukzubjnsoulvjeotfzy.supabase.co';
        window.supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1a3p1Ympuc291bHZqZW90Znp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY0NDgzNzYsImV4cCI6MjA4MjAyNDM3Nn0.vCKQSVn5i0pvK3cdbyJlIRzqWlmPt_kjQsVBxskZ3X0';
        window.supabaseClient = window.supabase.createClient(window.supabaseUrl, window.supabaseKey);
    </script>
</head>


<body>

    <div class="container">
        <div class="header">
            <div
                style="font-size: 1.2rem; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; font-weight: 800; margin-bottom: -5px;">
                North Castle</div>
            <h1 style="font-size: 2.8rem; margin: 0; line-height: 1.2;">Reporting Dashboard</h1>
            <p style="color: var(--text-muted); font-size: 1.2rem;">Level 4 Assessment Results</p>
        </div>

        <div class="glass-panel">
            <div class="filters">
                <select id="filterBranch" class="form-control" onchange="renderTable()">
                    <option value="all">All Branches</option>
                    <option value="kom hamada">Kom Hamada</option>
                    <option value="itay al-barud">Itay Al-Barud</option>
                    <option value="Dilinjat">Dilinjat</option>
                    <option value="kar Al-zayat">Kafr Al-Zayat</option>
                </select>

                <select id="filterCode" class="form-control" onchange="renderTable()">
                    <option value="all">All Trainer Codes</option>
                    <option value="8254">8254</option>
                    <option value="3917">3917</option>
                    <option value="6042">6042</option>
                    <option value="1589">1589</option>
                    <option value="7431">7431</option>
                    <option value="2965">2965</option>
                    <option value="5178">5178</option>
                    <option value="9306">9306</option>
                    <option value="4823">4823</option>
                    <option value="7190">7190</option>
                </select>

                <button class="primary-btn" onclick="renderTable()">↻ Refresh</button>
            </div>

            <div style="overflow-x: auto;">
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>Date & Time</th>
                            <th>Student</th>
                            <th>Trainer</th>
                            <th>Branch</th>
                            <th>Code</th>
                            <th>Score</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Data injected here -->
                    </tbody>
                </table>
                <div id="noDataMsg" style="text-align: center; padding: 40px; color: var(--text-muted); display: none;">
                    No results found.
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Mistakes -->
    <div class="modal-overlay" id="detailsModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">×</button>
            <h2 style="color: var(--accent); margin-bottom: 5px;" id="modalStudentName">Student Name</h2>
            <p style="color: var(--text-muted); margin-top: 0; margin-bottom: 30px;">Score: <span id="modalScore"
                    style="font-weight: bold; color: #fff;"></span></p>

            <h3 style="border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px;">Detailed Mistakes</h3>

            <div id="mistakesContainer">
                <!-- Mistakes injected here -->
            </div>
            <div id="perfectScoreMsg"
                style="display: none; text-align: center; color: var(--success); font-size: 1.5rem; padding: 40px;">
                🎉 Perfect Score! No mistakes made.
            </div>
        </div>
    </div>

    <script>
        let allResults = [];

        async function loadData() {
            try {
                const { data, error } = await window.supabaseClient.from('l4_results')
                    .select('*')
                    .order('id', { ascending: false });
                
                if (error) throw error;
                allResults = data || [];
            } catch (err) {
                console.error("Error loading data from Supabase:", err);
                allResults = [];
            }
        }

        function getScoreClass(score, total) {
            const percentage = (score / total) * 100;
            if (percentage >= 80) return 'score-good';
            if (percentage >= 50) return 'score-medium';
            return 'score-poor';
        }

        async function renderTable() {
            await loadData();
            const tbody = document.getElementById('tableBody');
            const noData = document.getElementById('noDataMsg');
            const branchFilter = document.getElementById('filterBranch').value;
            const codeFilter = document.getElementById('filterCode').value;

            tbody.innerHTML = '';

            const filteredData = allResults.filter(record => {
                const matchBranch = branchFilter === 'all' || record.branch === branchFilter;
                const matchCode = codeFilter === 'all' || record.trainerCode === codeFilter;
                return matchBranch && matchCode;
            });

            if (filteredData.length === 0) {
                noData.style.display = 'block';
                return;
            }

            noData.style.display = 'none';

            filteredData.forEach(record => {
                const tr = document.createElement('tr');

                tr.innerHTML = `
                    <td style="font-size: 0.9rem; color: var(--text-muted);">${record.timestamp}</td>
                    <td style="font-weight: bold; font-size: 1.2rem;">${record.studentName}</td>
                    <td>${record.trainerName}</td>
                    <td style="text-transform: capitalize;">${record.branch}</td>
                    <td>${record.trainerCode}</td>
                    <td><span class="score-badge ${getScoreClass(record.score, record.total)}">${record.score} / ${record.total}</span></td>
                    <td><button class="details-btn" onclick="openModal(${record.id})">👁️ View Details</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function openModal(id) {
            const record = allResults.find(r => r.id === id);
            if (!record) return;

            document.getElementById('modalStudentName').innerText = record.studentName;
            document.getElementById('modalScore').innerText = `${record.score} / ${record.total}`;

            const container = document.getElementById('mistakesContainer');
            const perfectMsg = document.getElementById('perfectScoreMsg');

            container.innerHTML = '';

            if (record.mistakes && record.mistakes.length > 0) {
                perfectMsg.style.display = 'none';
                container.style.display = 'block';

                record.mistakes.forEach(m => {
                    const card = document.createElement('div');
                    card.className = 'mistake-card';
                    card.innerHTML = `
                        <div class="mistake-cat">${m.category}</div>
                        <div class="mistake-q">Q: ${m.question}</div>
                        <div class="mistake-wrong">❌ Student Answer: <span>${m.userAnswer}</span></div>
                        <div class="mistake-correct">✅ Correct Answer: <span>${m.correctAnswer}</span></div>
                    `;
                    container.appendChild(card);
                });
            } else {
                container.style.display = 'none';
                perfectMsg.style.display = 'block';
            }

            document.getElementById('detailsModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('detailsModal').classList.remove('active');
        }

        // Initialize on load
        window.onload = renderTable;
    </script>
</body>

</html>
